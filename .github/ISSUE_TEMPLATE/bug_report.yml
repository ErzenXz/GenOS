name: Bug report
description: Report reproducible incorrect behavior in GenOS or its tooling.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make GenOS more reliable. Please remove sensitive information from logs.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the incorrect behavior and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Enter ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit
      description: The commit SHA or branch where the problem occurred.
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - QEMU on macOS
        - QEMU on Linux
        - Physical x86_64 hardware
        - Build or CI only
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Serial output or screenshots
      description: Paste relevant serial output or attach a screenshot. Use a code block for logs.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I tested the current main branch when practical.
          required: true
