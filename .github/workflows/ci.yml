name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-boot:
    name: Build, test, and boot
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install --yes mtools ovmf qemu-system-x86

      - name: Install Rust targets and components
        run: |
          rustup target add x86_64-unknown-none x86_64-unknown-uefi
          rustup component add clippy rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy -p kernel --lib -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Build and boot GenOS
        run: make test

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: genos-serial-log
          path: build/serial.log
          if-no-files-found: ignore
